services:
  redis:
    image: redis:7-alpine
    container_name: discord_bot
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-please_change_me_in_env}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-please_change_me_in_env}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: bot
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-please_change_me_in_env}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "import('ioredis').then(({default:R})=>{const c=new R(process.env.REDIS_URL);return c.ping().finally(()=>c.disconnect())}).then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  player:
    build:
      context: .
      dockerfile: Dockerfile.player
    container_name: player
    env_file: .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-please_change_me_in_env}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "import('ioredis').then(({default:R})=>{const c=new R(process.env.REDIS_URL);return c.ping().finally(()=>c.disconnect())}).then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redis_data:
