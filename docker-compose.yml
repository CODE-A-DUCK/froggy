version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ultra_discord_redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    container_name: ultra_discord_cp
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  data-plane:
    build:
      context: .
      dockerfile: Dockerfile.data-plane
    container_name: ultra_discord_dp
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
